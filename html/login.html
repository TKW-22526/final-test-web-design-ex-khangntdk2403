<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/pages.css">
</head>
<body>
<div class="auth">
  <div class="auth-card">
    <a href="../index.html" class="auth-card__logo">
      <span class="header__logo">DK</span>
      <span class="header__name">Code<span></span></span>
    </a>
    <h1 class="auth-card__title">Wellcome</h1>
    <p class="auth-card__desc">Đăng nhập để tiếp tục học tập cùng DK-code</p>

    <form data-validate novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" data-rule="required email" placeholder="name@email.com">
        <span class="error-text">Vui lòng nhập email hợp lệ</span>
      </div>

      <div class="form-group form-group--password">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" data-rule="required minlength6" placeholder="Nhập mật khẩu">
        <button type="button" aria-label="Hiện mật khẩu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <span class="error-text">Mật khẩu tối thiểu 6 ký tự</span>
      </div>

      <div class="form-row">
        <label><input type="checkbox"> Ghi nhớ đăng nhập</label>
        <a href="#">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="btn btn--primary btn--block">Đăng nhập</button>
    </form>

    <div class="auth-divider">hoặc tiếp tục với</div>

    <div class="auth-social">
      <button class="social-btn" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.52 12.27c0-.85-.08-1.66-.22-2.44H12v4.62h6.48a5.54 5.54 0 01-2.4 3.64v3h3.88c2.27-2.1 3.56-5.18 3.56-8.82z"/><path fill="#34A853" d="M12 24c3.24 0 5.96-1.07 7.95-2.9l-3.88-3c-1.08.72-2.46 1.15-4.07 1.15-3.13 0-5.78-2.11-6.73-4.96H1.26v3.1A11.99 11.99 0 0012 24z"/><path fill="#FBBC05" d="M5.27 14.29a7.2 7.2 0 010-4.58v-3.1H1.26a12 12 0 000 10.78l4.01-3.1z"/><path fill="#EA4335" d="M12 4.75c1.76 0 3.35.61 4.6 1.8l3.44-3.44C17.95 1.19 15.24 0 12 0 7.31 0 3.26 2.69 1.26 6.61l4.01 3.1C6.22 6.86 8.87 4.75 12 4.75z"/></svg>
        Đăng nhập với Google
      </button>
      <button class="social-btn" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.07C24 5.4 18.63 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.09 10.13 24v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.7 4.53-4.7 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.95.93-1.95 1.89v2.26h3.32l-.53 3.49h-2.79V24C19.61 23.09 24 18.1 24 12.07z"/></svg>
        Đăng nhập với Facebook
      </button>
    </div>

    <p class="auth-footer">Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
  </div>
</div>

<script src="../js/main.js"></script>
</body>
</html>
